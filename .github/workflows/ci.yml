name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

permissions:
  contents: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release --verbose

      - name: Prepare CI artifact
        run: |
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          mkdir -p dist
          cp target/release/sw dist/sw
          cat <<EOF > dist/README.md
          # Sociable Weaver Build Artifact

          This artifact contains the release build output produced by the CI pipeline.

          ## Contents

          - \`sw\`: release binary built with \`cargo build --release\`

          ## Build Metadata

          - OS: \`ubuntu-latest\`
          - Commit: \`${{ github.sha }}\`
          - Summary: \`${COMMIT_SUBJECT}\`
          - Workflow run: \`${{ github.run_id }}\`
          - Profile: \`release\`
          EOF

      - name: Upload CI artifact
        uses: actions/upload-artifact@v7
        with:
          name: sw-ci-ubuntu-latest
          path: dist/

  release_build:
    name: Release Build (${{ matrix.label }})
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary_path: target/release/sw
            asset_name: sw-linux-x86_64
          - os: macos-latest
            label: macos
            binary_path: target/release/sw
            asset_name: sw-macos
          - os: windows-latest
            label: windows-x86_64
            binary_path: target/release/sw.exe
            asset_name: sw-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Build release
        run: cargo build --release --verbose

      - name: Prepare release asset bundle
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.binary_path }}" "release/${{ matrix.asset_name }}"

      - name: Upload release asset bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.label }}
          path: release/${{ matrix.asset_name }}

  release:
    name: Release
    needs: release_build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release asset bundles
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Prepare official release README
        run: ./tools/render-release-readme.sh release/README.md
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/sw-linux-x86_64
            release/sw-macos
            release/sw-windows-x86_64.exe
            release/README.md
