entries:
  - type: Heading
    level: H1
    title: Scalar command scripts
  - type: Prerequisite
    checks:
      - kind: command
        name: Environment marker
        contents: |
          Environment marker file
          Must be available before the main workflow runs.
        commands: |
          printf '%s\n' prereq >> prereq-order.txt
        assert:
          exit_code: 0
        help: Create the environment marker before running this example.
  - type: Command
    commands: |
      NAME='Albert Attard'
      printf '%s\n' "${NAME}"
    output:
      caption: Name output
